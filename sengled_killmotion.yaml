alias: "Sengled Floodlights: Final Hardware Lockout"
description: "Disables hardware motion auto-on"
mode: parallel

trigger:
  - platform: state
    entity_id:
      - light.sengled_shed_flood_light
      - light.sengled_flood_light_2_r
    from: "unavailable"
  - platform: homeassistant
    event: start

action:
  - delay: "00:01:00"   # Wait 60 seconds for network/bulbs to stabilize

  - repeat:
      for_each:
        - "B0:CE:18:14:03:1A:2F:CE"
        - "B0:CE:18:14:03:1A:0F:A4"
      sequence:
        # Disable auto-on
        - service: zha.set_zigbee_cluster_attribute
          data:
            ieee: "{{ repeat.item }}"
            endpoint_id: 1
            cluster_id: 0xfc01
            cluster_type: "in"
            attribute: 0x0001
            value: false
            manufacturer: 0x1160
          continue_on_error: true

        - delay: "00:00:03"

        # Optional trigger condition
        - service: zha.set_zigbee_cluster_attribute
          data:
            ieee: "{{ repeat.item }}"
            endpoint_id: 1
            cluster_id: 0xfc01
            cluster_type: "in"
            attribute: 0x0000
            value: 1
            manufacturer: 0x1160
          continue_on_error: true

        - service: logbook.log
          data:
            name: "Sengled Motion Lockout"
            message: "Applied hardware lockout to {{ repeat.item }}"
