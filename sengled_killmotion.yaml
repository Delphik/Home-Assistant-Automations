alias: "Sengled Floodlights: Final Hardware Lockout"
description: Disables hardware-level motion triggers
triggers:
  - trigger: state
    entity_id:
      - light.sengled_shed_flood_light
      - light.sengled_flood_light_2_r
    from: unavailable
  - trigger: homeassistant
    event: start
actions:
  - delay: "00:00:20"
  - repeat:
      for_each:
        - "B0:CE:18:14:03:1A:2F:CE"
        - "B0:CE:18:14:03:1A:0F:A4"
      sequence:
        # Step 1: Disable Motion Auto-On
        - action: zha.set_zigbee_cluster_attribute
          data:
            ieee: "{{ repeat.item }}"
            endpoint_id: 1
            cluster_id: 0xfc01
            cluster_type: in
            attribute: 0x0001  # Explicitly using Hex
            value: 0           # Sending as integer 0
        - delay: "00:00:02"
        # Step 2: Set Trigger Condition to "Weak Light"
        - action: zha.set_zigbee_cluster_attribute
          data:
            ieee: "{{ repeat.item }}"
            endpoint_id: 1
            cluster_id: 0xfc01
            cluster_type: in
            attribute: 0x0000  # Explicitly using Hex 0x0000 (The likely cause of Log 2's error)
            value: 1
mode: parallel
