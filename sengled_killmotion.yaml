alias: "Sengled Floodlights: Final Hardware Lock"
description: "Disables hardware-level motion triggers"
mode: parallel
triggers:
  - trigger: state
    entity_id:
      - light.sengled_shed_flood_light
      - light.sengled_flood_light_2_r
actions:
  - delay: "00:00:10"
  - repeat:
      for_each:
        - "B0:CE:18:14:03:1A:2F:CE"
        - "B0:CE:18:14:03:1A:0F:A4"
      sequence:
        - action: zha.set_zigbee_cluster_attribute
          data:
            ieee: "{{ repeat.item }}"
            endpoint_id: 1
            cluster_id: 0xfc01   # Use hex directly
            cluster_type: in
            attribute: 0x0001    # Use hex directly
            value: "0"           # Quoted string sometimes helps ZHA parse Bool vs Int
            manufacturer: 4448   # 0x1160 in decimal
