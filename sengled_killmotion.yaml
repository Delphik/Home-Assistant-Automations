alias: "Sengled Floodlights: Final Hardware Lockout"
description: Disables hardware-level motion triggers on power-up and HA restart
triggers:
  - trigger: state
    entity_id:
      - light.sengled_shed_flood_light
      - light.sengled_flood_light_2_r
    from: unavailable
  - trigger: homeassistant
    event: start
actions:
  - delay: "00:00:15"
  - repeat:
      for_each:
        - B0:CE:18:14:03:1A:2F:CE
        - B0:CE:18:14:03:1A:0F:A4
      sequence:
        - action: zha.set_zigbee_cluster_attribute
          data:
            ieee: "{{ repeat.item }}"
            endpoint_id: 1
            cluster_id: 64513
            cluster_type: in
            attribute: 1
            value: 0
            manufacturer: 4448
        - delay: "00:00:01"
        - action: zha.set_zigbee_cluster_attribute
          data:
            ieee: "{{ repeat.item }}"
            endpoint_id: 1
            cluster_id: 64513
            cluster_type: in
            attribute: 0
            value: 1
            manufacturer: 4448
mode: parallel
