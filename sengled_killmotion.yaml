alias: "Sengled Floodlights: Final Hardware Lockout"
description: "Disables hardware motion auto-on (enableAutoOnOff = false)"
mode: parallel

trigger:
  - platform: state
    entity_id:
      - light.sengled_shed_flood_light
      - light.sengled_flood_light_2_r
    from: "unavailable"
  - platform: homeassistant
    event: start

action:
  - delay: "00:01:00"   # Give the bulbs time to fully wake up

  - repeat:
      for_each:
        - "B0:CE:18:14:03:1A:2F:CE"
        - "B0:CE:18:14:03:1A:0F:A4"
      sequence:
        # 1. Disable auto-on (enableAutoOnOff = false)
        - service: zha_toolkit.attr_write
          data:
            ieee: "{{ repeat.item }}"
            endpoint: 1
            cluster: 0xfc01
            attribute: 1
            attr_val: 0
            manf: 0x1160
            allow_create: true
          continue_on_error: true

        - delay: "00:00:03"

        # 2. Optional: Set trigger condition (helps with sensor mode)
        - service: zha_toolkit.attr_write
          data:
            ieee: "{{ repeat.item }}"
            endpoint: 1
            cluster: 0xfc01
            attribute: 0
            attr_val: 1
            manf: 0x1160
            allow_create: true
          continue_on_error: true

        - service: logbook.log
          data:
            name: "Sengled Motion Lockout"
            message: "Hardware lockout (enableAutoOnOff=0) applied to {{ repeat.item }}"
